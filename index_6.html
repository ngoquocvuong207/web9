<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trang phân tích URL</title>
  <style>
    body {
      font-family: Georgia, serif;
      background: #0d1117;
      color: #e6edf3;
      max-width: 600px;
      margin: 60px auto;
      padding: 0 20px;
    }

    h1 {
      font-size: 28px;
      color: #58a6ff;
      border-bottom: 2px solid #21262d;
      padding-bottom: 12px;
      margin-bottom: 20px;
    }

    .url-sample {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 12px 16px;
      font-family: monospace;
      font-size: 15px;
      margin-bottom: 28px;
    }

    .proto    { color: #ff7b72; }
    .domain   { color: #79c0ff; }
    .path     { color: #d2a8ff; }
    .query    { color: #56d364; }
    .fragment { color: #e3b341; }

    ul {
      list-style: none;
      padding: 0;
    }

    ul li {
      padding: 10px 14px;
      margin-bottom: 8px;
      border-radius: 6px;
      font-size: 15px;
    }

    ul li:nth-child(1) { background: #2a1a1a; border-left: 4px solid #ff7b72; }
    ul li:nth-child(2) { background: #0d1f2e; border-left: 4px solid #79c0ff; }
    ul li:nth-child(3) { background: #1e1a2e; border-left: 4px solid #d2a8ff; }
    ul li:nth-child(4) { background: #0d2218; border-left: 4px solid #56d364; }
    ul li:nth-child(5) { background: #2a2010; border-left: 4px solid #e3b341; }

    ul li strong { margin-right: 6px; }
  </style>
</head>
<body>
  <h1>Trang phân tích URL</h1>

  <div class="url-sample">
    <span class="proto">https</span>://<span class="domain">example.com</span><span class="path">/products/list</span><span class="query">?page=2</span><span class="fragment">#top</span>
  </div>

  <ul>
    <li><strong>Protocol:</strong> <span class="proto">https</span></li>
    <li><strong>Domain:</strong> <span class="domain">example.com</span></li>
    <li><strong>Path:</strong> <span class="path">/products/list</span></li>
    <li><strong>Query:</strong> <span class="query">page=2</span></li>
    <li><strong>Fragment:</strong> <span class="fragment">top</span></li>
  </ul>
</body>
</html>
